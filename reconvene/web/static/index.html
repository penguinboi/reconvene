<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reconvene</title>
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <script>
    // Apply a saved explicit theme before the stylesheet paints (avoids a flash of the
    // wrong theme). "auto"/absent leaves it to the prefers-color-scheme media query.
    (function () {
      var t = localStorage.getItem("reconvene-theme");
      if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="topbar">
    <a href="/" class="topbar-home"><img class="topbar-logo" src="/penguin-mascot.png" alt="Penguinboi Software" width="28" height="28"><h1>Reconvene<span class="cursor">▊</span></h1></a>
    <input id="searchBox" type="search" placeholder="Search sessions…" autocomplete="off">
    <div class="topbar-right">
      <a href="/settings.html">Settings</a>
      <button id="themeToggle" class="theme-toggle" type="button">🖥</button>
    </div>
  </div>
  <div id="journal" class="placeholder">Loading…</div>
  <div id="confirmModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalProjectName"></h2>
      <p id="modalFullRecap"></p>
      <div id="modalSessions"></div>
      <button id="modalConfirm">Resume</button>
      <button id="modalCancel">Cancel</button>
    </div>
  </div>
  <footer class="site-footer">
    🐧 A <a href="https://penguinboisoftware.com" rel="noopener noreferrer">Penguinboi Software</a> tool · Made with ❤️ and 🧠
  </footer>
  <script src="/theme.js"></script>
  <script src="/app.js"></script>
</body>
</html>
